<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="deco — Python-style decorators for Go">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ADD8"/>
      <stop offset="1" stop-color="#5DC9E2"/>
    </linearGradient>
    <style>.mono { font-family: 'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace; }</style>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="298" rx="21" fill="none" stroke="#222b36"/>
  <rect x="0" y="0" width="6" height="300" fill="url(#accent)"/>

  <!-- wordmark + tagline -->
  <text x="80" y="138" class="mono" font-size="88" font-weight="800" letter-spacing="-2">
    <tspan fill="#00ADD8">//</tspan><tspan fill="#e6edf3">deco</tspan>
  </text>
  <text x="86" y="182" class="mono" font-size="22" font-weight="600" fill="#adbac7">Python-style decorators for Go</text>

  <!-- a single code window: the router-as-decorator example -->
  <rect x="650" y="66" width="490" height="168" rx="12" fill="#0b0f14" stroke="#1f2630"/>
  <circle cx="674" cy="92" r="5" fill="#3d444d"/>
  <circle cx="692" cy="92" r="5" fill="#3d444d"/>
  <circle cx="710" cy="92" r="5" fill="#3d444d"/>
  <line x1="650" y1="110" x2="1140" y2="110" stroke="#1f2630"/>

  <text x="674" y="148" class="mono" font-size="16" xml:space="preserve"><tspan fill="#7ee787">//@decorate</tspan> <tspan fill="#79c0ff">routing</tspan><tspan fill="#e6edf3">.Route(</tspan><tspan fill="#a5d6ff">"GET", "/users"</tspan><tspan fill="#e6edf3">)</tspan></text>
  <text x="674" y="176" class="mono" font-size="16" xml:space="preserve"><tspan fill="#7ee787">//@decorate</tspan> <tspan fill="#79c0ff">middleware</tspan><tspan fill="#e6edf3">.Logged</tspan></text>
  <text x="674" y="204" class="mono" font-size="16" xml:space="preserve"><tspan fill="#ff7b72">func</tspan> <tspan fill="#d2a8ff">Users</tspan><tspan fill="#e6edf3">(w, r) { … }</tspan></text>
</svg>
