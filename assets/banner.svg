<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="deco — Python-style decorators for Go, generated at build time">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ADD8"/>
      <stop offset="1" stop-color="#5DC9E2"/>
    </linearGradient>
    <style>
      .mono { font-family: 'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="23" fill="none" stroke="#222b36"/>
  <rect x="0" y="0" width="6" height="360" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="74" y="168" class="mono" font-size="108" font-weight="800" letter-spacing="-2">
    <tspan fill="#00ADD8">//</tspan><tspan fill="#e6edf3">deco</tspan>
  </text>

  <!-- taglines -->
  <text x="80" y="216" class="mono" font-size="27" font-weight="600" fill="#adbac7">Python-style decorators for Go</text>
  <text x="80" y="248" class="mono" font-size="16" fill="#768390">comment-hosted decorator transpiler · generated at build time</text>

  <!-- code chip -->
  <rect x="78" y="278" width="452" height="46" rx="10" fill="#0b0f14" stroke="#1f2630"/>
  <text x="98" y="307" class="mono" font-size="20" xml:space="preserve">
    <tspan fill="#7ee787">//@decorate</tspan><tspan fill="#e6edf3"> timing(</tspan><tspan fill="#a5d6ff">"slow"</tspan><tspan fill="#e6edf3">)</tspan>
  </text>

  <!-- wrapping diagram: topmost annotation = outermost wrapper -->
  <g>
    <!-- outer: logged -->
    <rect x="706" y="58" width="430" height="244" rx="18" fill="none" stroke="#00ADD8" stroke-opacity="0.85" stroke-width="2"/>
    <text x="726" y="90" class="mono" font-size="20" fill="#00ADD8">logged</text>

    <!-- middle: timing -->
    <rect x="748" y="104" width="346" height="152" rx="15" fill="none" stroke="#5DC9E2" stroke-opacity="0.8" stroke-width="2"/>
    <text x="768" y="134" class="mono" font-size="18" fill="#5DC9E2">timing("slow")</text>

    <!-- inner: the function -->
    <rect x="790" y="150" width="262" height="78" rx="12" fill="#00ADD8" fill-opacity="0.14" stroke="#00ADD8"/>
    <text x="921" y="196" class="mono" font-size="22" font-weight="700" fill="#e6edf3" text-anchor="middle">Add(a, b) int</text>

    <!-- caption -->
    <text x="921" y="288" class="mono" font-size="14" fill="#768390" text-anchor="middle">topmost annotation = outermost wrapper</text>
  </g>
</svg>
